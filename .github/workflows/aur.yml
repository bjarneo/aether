name: Publish to AUR

on:
  workflow_run:
    workflows: ["Release"]
    types: [completed]

jobs:
  aur:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_branch }}

      - name: Extract version
        id: version
        env:
          TAG: ${{ github.event.workflow_run.head_branch }}
        run: |
          echo "pkgver=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Generate PKGBUILD
        env:
          PKGVER: ${{ steps.version.outputs.pkgver }}
          REPO: ${{ github.repository }}
        run: |
          SOURCE_URL="https://github.com/${REPO}/archive/refs/tags/v${PKGVER}.tar.gz"
          SHA256=$(curl -sL "$SOURCE_URL" | sha256sum | cut -d' ' -f1)

          cat > PKGBUILD <<'HEREDOC'
          # Maintainer: Bjarne Øverli <bjarne@oever.li>
          pkgname=aether
          pkgver=PKGVER_PLACEHOLDER
          pkgrel=1
          pkgdesc='Desktop theming application - extract colors from wallpapers and apply cohesive themes'
          arch=('x86_64')
          url='https://github.com/bjarneo/aether'
          license=('MIT')
          depends=('webkit2gtk-4.1' 'gtk3')
          makedepends=('go' 'nodejs' 'npm')
          source=("${pkgname}-${pkgver}.tar.gz::https://github.com/bjarneo/aether/archive/refs/tags/v${pkgver}.tar.gz")
          sha256sums=('SHA256_PLACEHOLDER')

          build() {
              cd "${srcdir}/${pkgname}-${pkgver}"

              export CGO_CFLAGS="${CFLAGS}"
              export CGO_CXXFLAGS="${CXXFLAGS}"
              export CGO_LDFLAGS="${LDFLAGS}"
              export GOFLAGS="-buildmode=pie -trimpath -mod=readonly -modcacherw"
              export GOPATH="${srcdir}/gopath"
              export PATH="${GOPATH}/bin:${PATH}"

              go install github.com/wailsapp/wails/v2/cmd/wails@v2.11.0

              wails build -tags webkit2_41
          }

          package() {
              cd "${srcdir}/${pkgname}-${pkgver}"

              install -Dm755 build/bin/aether "${pkgdir}/usr/bin/aether"
              install -Dm644 build/linux/aether.desktop "${pkgdir}/usr/share/applications/aether.desktop"
              install -Dm644 icon.png "${pkgdir}/usr/share/pixmaps/aether.png"
              install -Dm644 README.md "${pkgdir}/usr/share/doc/${pkgname}/README.md"
          }
          HEREDOC

          sed -i 's/^          //' PKGBUILD
          sed -i "s|PKGVER_PLACEHOLDER|${PKGVER}|" PKGBUILD
          sed -i "s|SHA256_PLACEHOLDER|${SHA256}|" PKGBUILD

          cat PKGBUILD

      - name: Publish to AUR
        uses: KSXGitHub/github-actions-deploy-aur@v4.1.1
        with:
          pkgname: aether
          pkgbuild: ./PKGBUILD
          commit_username: ${{ secrets.AUR_USERNAME }}
          commit_email: ${{ secrets.AUR_EMAIL }}
          ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          commit_message: "Update to v${{ steps.version.outputs.pkgver }}"
