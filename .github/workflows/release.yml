name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev pkg-config

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.11.0

      - name: Build
        run: wails build -tags webkit2_41

      - name: Prepare release artifact
        run: |
          mv build/bin/aether build/bin/aether-linux-amd64
          chmod +x build/bin/aether-linux-amd64

      - name: Generate Changelog
        id: changelog
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
          GITHUB_REPO: ${{ github.repository }}
        run: |
          PREVIOUS_TAG=$(git tag --sort=-version:refname | grep -v "^${TAG_NAME}$" | head -n 1)

          if [ -z "$PREVIOUS_TAG" ]; then
            PREVIOUS_TAG=$(git rev-list --max-parents=0 HEAD)
          fi

          CHANGELOG=""

          while IFS='|' read -r hash title author email; do
            short_hash="${hash:0:7}"
            username=$(gh api "repos/${GITHUB_REPO}/commits/$hash" --jq '.author.login' 2>/dev/null || echo "")

            if [ -n "$username" ]; then
              author_info="$author (@$username)"
            else
              author_info="$author"
            fi

            if [[ "$title" =~ ^Merge\ pull\ request\ \#([0-9]+) ]]; then
              pr_number="${BASH_REMATCH[1]}"
              pr_title=$(gh pr view "$pr_number" --json title --jq '.title' 2>/dev/null || echo "$title")
              CHANGELOG="${CHANGELOG}- $pr_title (#$pr_number) by $author_info ([\`$short_hash\`](https://github.com/${GITHUB_REPO}/commit/$hash))"$'\n'
            else
              CHANGELOG="${CHANGELOG}- $title by $author_info ([\`$short_hash\`](https://github.com/${GITHUB_REPO}/commit/$hash))"$'\n'
            fi
          done < <(git log "$PREVIOUS_TAG".."$TAG_NAME" --pretty=format:"%H|%s|%an|%ae")

          echo "$CHANGELOG" > changelog.md
          echo "changelog<<EOF" >> "$GITHUB_OUTPUT"
          echo "$CHANGELOG" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Calculate SHA256 of source archive
        id: archive
        env:
          TAG_NAME: ${{ github.ref_name }}
          GITHUB_REPO: ${{ github.repository }}
        run: |
          wget -q "https://github.com/${GITHUB_REPO}/archive/${TAG_NAME}.tar.gz"
          SHA256=$(sha256sum "${TAG_NAME}.tar.gz" | awk '{print $1}')
          echo "sha256=$SHA256" >> "$GITHUB_OUTPUT"

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          generate_release_notes: false
          files: build/bin/aether-linux-amd64
          body: |
            ## What's Changed

            ${{ steps.changelog.outputs.changelog }}

            ## Installation

            ### From AUR
            ```bash
            yay -S aether
            # or
            paru -S aether
            ```

            ### Pre-built Binary
            ```bash
            wget https://github.com/bjarneo/aether/releases/download/${{ github.ref_name }}/aether-linux-amd64
            chmod +x aether-linux-amd64
            sudo mv aether-linux-amd64 /usr/local/bin/aether
            ```

            ### Build from Source
            Requires Go 1.23+, Node.js 22+, and [Wails](https://wails.io/docs/gettingstarted/installation).
            ```bash
            git clone https://github.com/bjarneo/aether.git
            cd aether
            wails build
            ```

            ---

            **SHA256 (source archive, for PKGBUILD):**
            ```
            ${{ steps.archive.outputs.sha256 }}
            ```
