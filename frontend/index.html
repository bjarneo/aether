<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta content="width=device-width, initial-scale=1.0" name="viewport" />
        <title>Aether</title>
    </head>
    <body>
        <script>
            // Apply cached theme colors synchronously to prevent flash
            try {
                var cached = localStorage.getItem('aether-theme-colors');
                if (cached) {
                    var colors = JSON.parse(cached);
                    var root = document.documentElement;
                    for (var name in colors) {
                        root.style.setProperty(
                            '--aether-' + name,
                            colors[name]
                        );
                    }
                    if (colors.background) {
                        // Mirrors OVERLAY_TOKENS / BG_SECONDARY_SHIFT in
                        // App.svelte. Inlined because this script runs
                        // before the module bundle and cannot import.
                        var bgHex = colors.background.replace('#', '');
                        var br = parseInt(bgHex.slice(0, 2), 16);
                        var bgg = parseInt(bgHex.slice(2, 4), 16);
                        var bb = parseInt(bgHex.slice(4, 6), 16);
                        var isLightBg =
                            (br * 299 + bgg * 587 + bb * 114) / 1000 > 128;
                        var shift = isLightBg ? -10 : 10;
                        var clamp = function (n) {
                            return Math.max(0, Math.min(255, n));
                        };
                        var ov = isLightBg ? '0,0,0' : '255,255,255';
                        var overlayTokens = [
                            ['--color-bg-surface', 0.03, 0.04],
                            ['--color-bg-elevated', 0.06, 0.07],
                            ['--color-bg-hover', 0.04, 0.05],
                            ['--color-border', 0.1, 0.08],
                            ['--color-border-focus', 0.2, 0.18],
                        ];
                        root.style.setProperty(
                            '--color-bg-primary',
                            colors.background
                        );
                        root.style.setProperty(
                            '--color-bg-secondary',
                            'rgb(' +
                                clamp(br + shift) +
                                ',' +
                                clamp(bgg + shift) +
                                ',' +
                                clamp(bb + shift) +
                                ')'
                        );
                        for (var i = 0; i < overlayTokens.length; i++) {
                            var t = overlayTokens[i];
                            root.style.setProperty(
                                t[0],
                                'rgba(' +
                                    ov +
                                    ',' +
                                    (isLightBg ? t[1] : t[2]) +
                                    ')'
                            );
                        }
                        document.body.style.background = colors.background;
                    }
                    if (colors.foreground) {
                        root.style.setProperty(
                            '--color-fg-primary',
                            colors.foreground
                        );
                        // Keep secondary/dimmed tokens in the foreground hue
                        // so labels stay readable on light theme backgrounds.
                        var hex = colors.foreground.replace('#', '');
                        if (hex.length === 6) {
                            var r = parseInt(hex.slice(0, 2), 16);
                            var g = parseInt(hex.slice(2, 4), 16);
                            var b = parseInt(hex.slice(4, 6), 16);
                            root.style.setProperty(
                                '--color-fg-secondary',
                                'rgba(' + r + ',' + g + ',' + b + ',0.75)'
                            );
                            root.style.setProperty(
                                '--color-fg-dimmed',
                                'rgba(' + r + ',' + g + ',' + b + ',0.5)'
                            );
                        }
                        document.body.style.color = colors.foreground;
                    }
                    if (colors.blue) {
                        root.style.setProperty('--color-accent', colors.blue);
                    }
                    if (colors.red) {
                        root.style.setProperty(
                            '--color-destructive',
                            colors.red
                        );
                    }
                    if (colors.green) {
                        root.style.setProperty('--color-success', colors.green);
                    }
                    if (colors.yellow) {
                        root.style.setProperty(
                            '--color-warning',
                            colors.yellow
                        );
                    }
                }
            } catch (e) {}
        </script>
        <div id="app"></div>
        <script src="./src/main.ts" type="module"></script>
    </body>
</html>
